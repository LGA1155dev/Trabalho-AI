<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Battle Arena</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="comparar.css">
</head>

<body>

<header>
<nav>
<a href="#">Home</a>
<a href="#">Github</a>
<a href="#">Docs</a>
</nav>

<h1>AI BATTLE ARENA</h1>
<p>Arraste duas IAs para a arena e confirme o duelo</p>
</header>

<main>

<section class="arena-selection">
<h2>Escolha sua IA</h2>

<div class="ia-list">
<img src="../imagens/copilot-logo.png" id="copilot" draggable="true">
<img src="../imagens/logo-chatgpt.png" id="chatgpt" draggable="true">
<img src="../imagens/logo-gemini.png" id="gemini" draggable="true">
<img src="../imagens/meta-ai-logo.png" id="meta" draggable="true">
<img src="../imagens/deepseek-logo.png" id="deepseek" draggable="true">
</div>
</section>

<section class="battle-zone">

<div class="card drop-zone" id="slot1">
<p>Arraste aqui</p>
<div class="comparacao"></div>
</div>

<div class="versus-glow">VS</div>

<div class="card drop-zone" id="slot2">
<p>Arraste aqui</p>
<div class="comparacao"></div>
</div>

</section>

<div class="center">
<button id="confirmar" disabled>CONFIRMAR DUELO</button>
</div>

<section class="resultado-final" id="resultadoFinal"></section>

</main>

<script src="comparar.js"></script>
</body>
</html>
