<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de AI's</title>
    <link rel="stylesheet" href="estilos/comparar.css">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>
<body>
    <header>
        <h1>Compare e veja qual AI é melhor!</h1>
    </header>
    <main>
        <h1>Qual ai você deseja compara?</h1>

        <section class="comparar">

            <img src="imagens/copilot-logo.png" alt="logo do copilot" id="copilot">

            <img src="imagens/logo-chatgpt.png" alt="logo do chat gpt" id="chatgpt">

            <img src="imagens/logo-gemini.png" alt="logo do gemini" id="gemini">

            <img src="imagens/meta-ai-logo.png" alt="logo da meta ai" id="meta">

        </section>

        <section class="resultados">
            <ul class="IA">
                <img src="" alt="" id="cop">
                <img src="" alt="" id="chat">
                <img src="" alt="" id="gemini">
                <img src="" alt="" id="meta">
            </ul>
        </section>
    </main>

    <script src="comparar.js"></script>
</body>
</html>
